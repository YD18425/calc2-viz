<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>The Method of Washers — about the y-axis</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
<style>
  :root{ --blue:#005AAA; --green:#007D55; --red:#C42327; }
  *{box-sizing:border-box} body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:#222;background:#fff}
  header{background:var(--blue);color:#fff;padding:10px 14px}
  header h1{font-size:1.02rem;margin:0} header .sub{font-size:.82rem;opacity:.92;margin-top:2px}
  #plot{width:100vw;height:62vh;min-height:340px}
  .panel{padding:10px 14px;border-top:1px solid #e6e6e6}
  .row{display:flex;flex-wrap:wrap;gap:14px;align-items:center;font-size:.86rem;margin-top:6px}
  .chip{display:inline-flex;align-items:center;gap:6px}
  .sw{width:14px;height:14px;border-radius:3px;display:inline-block;border:1px solid #0003}
  label{font-size:.84rem;color:#444} input[type=range]{vertical-align:middle}
  .formula{font-size:.9rem;background:#f5f8fc;border:1px solid #dbe7f4;border-radius:6px;padding:8px 10px;margin-top:8px;overflow-x:auto}
  .err{color:#b00;font-size:.85rem;padding:10px 14px} button{font-size:.84rem;padding:5px 10px;border:1px solid #bcd;border-radius:6px;background:#eef5fc;cursor:pointer}
</style>
</head>
<body>
<header><h1 id="ttl">Solid of Revolution</h1><div class="sub" id="sub">Math 102 — Calculus II · interactive 3D</div></header>
<div id="plot"></div>
<div id="err" class="err" style="display:none"></div>
<div class="panel">
  <div class="row">
    <span class="chip"><span class="sw" style="background:#9ad1ff"></span>generating curve</span>
    <span class="chip"><span class="sw" style="background:#56c596"></span>solid of revolution</span>
    <span class="chip"><span class="sw" style="background:#e23b3b"></span>axis of rotation</span>
    <span class="chip"><span class="sw" style="background:#f4a300"></span>cross-section</span>
  </div>
  <div class="row">
    <label>Sweep <input id="ang" type="range" min="20" max="360" value="300"> <span id="angv">300&deg;</span></label>
    <label>Slice <input id="slc" type="range" min="0" max="100" value="50"></label>
    <button id="reset">Reset view</button>
  </div>
  <div class="formula" id="frm"></div>
</div>
<script>
"use strict";
// ---- baked-in defaults for THIS solid (URL query string overrides any of these) ----
const DEFAULTS = {"axis": "y", "t0": 0, "t1": 3.4, "outer": "0.95+0.30*sin(t)", "inner": "0.42+0.12*sin(t)", "title": "The Method of Washers \u2014 about the y-axis", "sub": "Washer method (illustration)"};
const $=id=>document.getElementById(id);
function qp(){const p=new URLSearchParams(location.search),o={};for(const[k,v]of p)o[k]=v;return o;}
function mkfun(expr){
  if(expr===undefined||expr===null||expr==="") return t=>0;
  let s=String(expr).toLowerCase();
  if(!/^[0-9t+\-*/^().,\sa-z]*$/.test(s)) throw new Error("bad characters in '"+expr+"'");
  s=s.replace(/\bpi\b/g,"Math.PI").replace(/\bcbrt\(/g,"Math.cbrt(")
     .replace(/\bsqrt\(/g,"Math.sqrt(").replace(/\babs\(/g,"Math.abs(")
     .replace(/\bexp\(/g,"Math.exp(").replace(/\blog\(/g,"Math.log(")
     .replace(/\bsin\(/g,"Math.sin(").replace(/\bcos\(/g,"Math.cos(")
     .replace(/\btan\(/g,"Math.tan(").replace(/\bln\(/g,"Math.log(")
     .replace(/\^/g,"**");
  return new Function("t","try{return ("+s+");}catch(e){return NaN;}");
}
function linspace(a,b,n){const o=[];for(let i=0;i<n;i++)o.push(a+(b-a)*i/(n-1));return o;}
const o=Object.assign({},DEFAULTS,qp());
$("ttl").textContent=o.title||"Solid of Revolution";
if(o.sub)$("sub").textContent=o.sub+" · interactive 3D";
let axis=(o.axis||"x").toLowerCase();
const CAM = (axis==="x")
  ? {eye:{x:0.15,y:-2.05,z:0.72}, up:{x:0,y:0,z:1}, center:{x:0,y:0,z:0}}
  : {eye:{x:2.0,y:0.55,z:1.55},  up:{x:0,y:1,z:0}, center:{x:0,y:0,z:0}};
let t0=parseFloat(o.t0), t1=parseFloat(o.t1);
let Rout,Rin;
try{ Rout=mkfun(o.outer); Rin=mkfun(o.inner!==undefined?o.inner:"0"); }
catch(e){ $("err").style.display="block"; $("err").textContent="Parameter error: "+e.message; }
const NT=80,NA=80;
function surfaceMesh(Rfun,ang){const ts=linspace(t0,t1,NT),th=linspace(0,ang*Math.PI/180,NA);const X=[],Y=[],Z=[];
  for(let i=0;i<NA;i++){const xr=[],yr=[],zr=[];for(let j=0;j<NT;j++){const t=ts[j],r=Math.max(0,Rfun(t)||0),c=Math.cos(th[i]),s=Math.sin(th[i]);
    if(axis==="x"){xr.push(t);yr.push(r*c);zr.push(r*s);}else{yr.push(t);xr.push(r*c);zr.push(r*s);}}X.push(xr);Y.push(yr);Z.push(zr);}return {x:X,y:Y,z:Z};}
function ring(Rfun,t,ang){const th=linspace(0,ang*Math.PI/180,120),x=[],y=[],z=[];const r=Math.max(0,Rfun(t)||0);
  for(const a of th){const c=Math.cos(a),s=Math.sin(a);if(axis==="x"){x.push(t);y.push(r*c);z.push(r*s);}else{y.push(t);x.push(r*c);z.push(r*s);}}return {x,y,z};}
function genCurve(Rfun,ang){const ts=linspace(t0,t1,NT),x=[],y=[],z=[];for(const t of ts){const r=Math.max(0,Rfun(t)||0);
  if(axis==="x"){x.push(t);y.push(r);z.push(0);}else{y.push(t);x.push(r);z.push(0);}}return {x,y,z};}
function draw(){ if($("err").style.display==="block")return;
  const ang=parseFloat($("ang").value); $("angv").textContent=ang+"\u00B0";
  const frac=parseFloat($("slc").value)/100, tcut=t0+(t1-t0)*frac;
  const hasHole=(()=>{for(const t of linspace(t0,t1,40)){if((Rin(t)||0)>1e-9)return true;}return false;})();
  const traces=[]; const so=surfaceMesh(Rout,ang);
  traces.push({type:"surface",x:so.x,y:so.y,z:so.z,showscale:false,opacity:0.5,colorscale:[[0,"#46b07a"],[1,"#46b07a"]],flatshading:true,hoverinfo:"skip",lighting:{ambient:0.66,diffuse:0.85,specular:0.10,roughness:0.9,fresnel:0.1},lightposition:{x:120,y:200,z:240}});
  if(hasHole){const si=surfaceMesh(Rin,ang);traces.push({type:"surface",x:si.x,y:si.y,z:si.z,showscale:false,opacity:0.85,colorscale:[[0,"#3d6fa6"],[1,"#3d6fa6"]],flatshading:true,hoverinfo:"skip",lighting:{ambient:0.7,diffuse:0.8,specular:0.1,roughness:0.9},lightposition:{x:120,y:200,z:240}});}
  const gc=genCurve(Rout,ang);traces.push({type:"scatter3d",mode:"lines",x:gc.x,y:gc.y,z:gc.z,line:{width:7,color:"#0d47a1"},name:"outer radius R"});
  if(hasHole){const gi=genCurve(Rin,ang);traces.push({type:"scatter3d",mode:"lines",x:gi.x,y:gi.y,z:gi.z,line:{width:6,color:"#1f6fc4",dash:"dash"},name:"inner radius r"});}
  const ro=ring(Rout,tcut,ang);traces.push({type:"scatter3d",mode:"lines",x:ro.x,y:ro.y,z:ro.z,line:{width:8,color:"#f4a300"},name:"cross-section"});
  if(hasHole){const ri=ring(Rin,tcut,ang);traces.push({type:"scatter3d",mode:"lines",x:ri.x,y:ri.y,z:ri.z,line:{width:6,color:"#f4a300",dash:"dot"},name:"inner rim"});}
  let ax= axis==="x" ? {x:[t0-0.4,t1+0.4],y:[0,0],z:[0,0]} : {x:[0,0],y:[t0-0.4,t1+0.4],z:[0,0]};
  traces.push({type:"scatter3d",mode:"lines",x:ax.x,y:ax.y,z:ax.z,line:{width:7,color:"#e23b3b"},name:(axis==="x"?"x-axis":"y-axis")});
  const layout={margin:{l:0,r:0,t:0,b:0},showlegend:true,legend:{orientation:"h",y:1.04,x:0,font:{size:11}},
    scene:{aspectmode:"data",xaxis:{title:"x",showbackground:true,backgroundcolor:"#fafafa",gridcolor:"#e3e3e3"},
      yaxis:{title:"y",showbackground:true,backgroundcolor:"#fafafa",gridcolor:"#e3e3e3"},
      zaxis:{title:"z",showbackground:true,backgroundcolor:"#fafafa",gridcolor:"#e3e3e3"},camera:CAM}};
  Plotly.react("plot",traces,layout,{responsive:true,displaylogo:false});
}
$("ang").oninput=draw; $("slc").oninput=draw;
$("reset").onclick=()=>Plotly.relayout("plot",{"scene.camera":CAM});
(function(){const dv=(axis==="x")?"dx":"dy",R=o.outer,r=(o.inner!==undefined?o.inner:"0");
  $("frm").textContent=(String(r)==="0"||String(r)==="")
    ? "V = \u03C0 \u222B ["+R+"]\u00B2 "+dv+"   (disk),  "+axis+" \u2208 ["+t0+", "+t1+"]"
    : "V = \u03C0 \u222B ( ["+R+"]\u00B2 \u2212 ["+r+"]\u00B2 ) "+dv+"   (washer),  "+axis+" \u2208 ["+t0+", "+t1+"]";})();
draw();
</script>
</body>
</html>
